<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StartKaba — Admin Beta</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0722AB;--blue-l:#0722AB12;--blue-m:#0722AB30;
  --green:#1A6B00;--green-l:#AEFF94;--green-p:#AEFF9420;
  --orange:#F77E2D;--orange-l:#F77E2D15;
  --red:#DC2626;--red-l:#DC262615;
  --g50:#F7F8FC;--g100:#F0F1F7;--g200:#E2E4EE;
  --g400:#9CA3B8;--g600:#6B6F85;--g900:#1A1C2A;
  --white:#FFFFFF;--rsm:8px;--rmd:12px;--rlg:18px;--rxl:24px;
}
body{font-family:'Montserrat',sans-serif;background:var(--g50);color:var(--g900);min-height:100vh}

#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.lbox{background:var(--white);border:1px solid var(--g200);border-radius:var(--rxl);padding:2.5rem;width:100%;max-width:380px;text-align:center}
.llogo{font-size:1.4rem;font-weight:800;color:var(--blue);margin-bottom:.25rem}
.llogo span{color:var(--orange)}
.lsub{font-size:.8rem;color:var(--g600);margin-bottom:2rem}
.lbox input{width:100%;padding:.75rem 1rem;border:1.5px solid var(--g200);border-radius:var(--rsm);font-family:'Montserrat',sans-serif;font-size:.9rem;outline:none;margin-bottom:.75rem}
.lbox input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.lbtn{width:100%;background:var(--blue);color:var(--white);font-family:'Montserrat',sans-serif;font-weight:700;font-size:.9rem;padding:.75rem;border:none;border-radius:100px;cursor:pointer}
.lbtn:hover{background:#0920A0}
.lerr{font-size:.78rem;color:var(--red);margin-top:.5rem;display:none}

#app{display:none}

nav{background:var(--white);border-bottom:1px solid var(--g200);padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.nlogo{font-size:1.1rem;font-weight:800;color:var(--blue)}
.nlogo span{color:var(--orange)}
.nright{display:flex;align-items:center;gap:1rem}
.nbadge{background:var(--blue-l);color:var(--blue);font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:100px}
.brefresh{background:none;border:1.5px solid var(--g200);border-radius:var(--rsm);padding:.4rem .9rem;font-family:'Montserrat',sans-serif;font-size:.75rem;font-weight:600;color:var(--g600);cursor:pointer}
.brefresh:hover{border-color:var(--blue);color:var(--blue)}

.main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}

.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.9rem;margin-bottom:2rem}
.sc{background:var(--white);border:1px solid var(--g200);border-radius:var(--rmd);padding:1rem 1.1rem}
.slabel{font-size:.65rem;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.35rem}
.sval{font-size:1.9rem;font-weight:800;line-height:1}
.sval.b{color:var(--blue)}.sval.g{color:var(--green)}.sval.o{color:var(--orange)}.sval.r{color:var(--red)}

.filters{display:flex;align-items:center;gap:.6rem;margin-bottom:1.1rem;flex-wrap:wrap}
.fbtn{background:var(--white);border:1.5px solid var(--g200);border-radius:100px;padding:.35rem .9rem;font-family:'Montserrat',sans-serif;font-size:.72rem;font-weight:600;color:var(--g600);cursor:pointer;transition:all .15s}
.fbtn:hover,.fbtn.active{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.sinput{flex:1;min-width:180px;padding:.4rem .9rem;border:1.5px solid var(--g200);border-radius:100px;font-family:'Montserrat',sans-serif;font-size:.78rem;outline:none}
.sinput:focus{border-color:var(--blue)}

.clist{display:flex;flex-direction:column;gap:.9rem}

.cc{background:var(--white);border:1px solid var(--g200);border-radius:var(--rlg);overflow:hidden}
.cc.s-en_attente{border-left:4px solid var(--orange)}
.cc.s-accepte{border-left:4px solid var(--green)}
.cc.s-actif{border-left:4px solid var(--blue)}
.cc.s-refuse{border-left:4px solid var(--red)}
.cc.s-termine{border-left:4px solid var(--g400)}

.ch{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.1rem;gap:.75rem;flex-wrap:wrap}
.cid{display:flex;align-items:center;gap:.6rem}
.av{width:38px;height:38px;border-radius:50%;background:var(--blue-l);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:var(--blue);flex-shrink:0}
.cname{font-size:.9rem;font-weight:800}
.cmeta{font-size:.68rem;color:var(--g600);margin-top:2px}
.cact{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}

.badge{display:inline-block;font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:100px;white-space:nowrap}
.ba{background:#FEF3C7;color:#92400E}
.bacc{background:var(--green-p);color:var(--green)}
.bref{background:var(--red-l);color:var(--red)}
.bact{background:var(--blue-l);color:var(--blue)}
.bter{background:var(--g100);color:var(--g600)}

.btn{display:inline-flex;align-items:center;gap:4px;padding:.3rem .75rem;border-radius:100px;font-family:'Montserrat',sans-serif;font-size:.68rem;font-weight:700;border:1.5px solid;cursor:pointer;white-space:nowrap;transition:all .15s;text-decoration:none}
.btn-ok{background:var(--green-p);border-color:var(--green);color:var(--green)}
.btn-ok:hover{background:var(--green);color:var(--white)}
.btn-no{background:var(--red-l);border-color:var(--red);color:var(--red)}
.btn-no:hover{background:var(--red);color:var(--white)}
.btn-wa{background:#E7FBF0;border-color:#25D366;color:#128C4E}
.btn-wa:hover{background:#25D366;color:var(--white)}
.btn-n{background:var(--white);border-color:var(--g200);color:var(--g600)}
.btn-n:hover{border-color:var(--blue);color:var(--blue)}

.cbody{border-top:1px solid var(--g100);padding:.9rem 1.1rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
@media(max-width:680px){.cbody{grid-template-columns:1fr}}

.stitle{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g400);margin-bottom:.5rem}

.chrow{display:flex;gap:.6rem}
.chi{display:flex;flex-direction:column;align-items:center;gap:3px}
.cdot{width:34px;height:34px;border-radius:50%;border:2px solid var(--g200);font-size:.62rem;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--g400);transition:all .15s;user-select:none}
.cdot.done{background:var(--green);border-color:var(--green);color:var(--white)}
.cdot:hover:not(.done){border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.clabel{font-size:.58rem;font-weight:700;color:var(--g600)}

select.ssel{border:1.5px solid var(--g200);border-radius:var(--rsm);padding:5px 6px;font-family:'Montserrat',sans-serif;font-size:.72rem;font-weight:600;background:var(--white);cursor:pointer;outline:none;width:100%;margin-bottom:.5rem}
select.ssel:focus{border-color:var(--blue)}

.wabts{display:flex;flex-direction:column;gap:.35rem}

textarea.nota{width:100%;border:1.5px solid var(--g200);border-radius:var(--rsm);padding:.45rem .65rem;font-family:'Montserrat',sans-serif;font-size:.75rem;resize:vertical;min-height:65px;outline:none;color:var(--g900)}
textarea.nota:focus{border-color:var(--blue)}
.snbtn{margin-top:4px;background:none;border:1.5px solid var(--g200);border-radius:100px;padding:2px 10px;font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:700;color:var(--g600);cursor:pointer}
.snbtn:hover{border-color:var(--green);color:var(--green)}
.snbtn.saved{border-color:var(--green);color:var(--green)}

.pourq{font-size:.76rem;color:var(--g600);line-height:1.55;font-style:italic}

.smsg{text-align:center;padding:3rem 1rem;color:var(--g400);font-size:.85rem}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--g200);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:.75rem}
@keyframes sp{to{transform:rotate(360deg)}}

#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--g900);color:var(--white);font-size:.78rem;font-weight:600;padding:.6rem 1.2rem;border-radius:100px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999}
#toast.show{opacity:1}

#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:1rem}
#modal.open{display:flex}
.mbox{background:var(--white);border-radius:var(--rxl);padding:1.75rem;max-width:500px;width:100%}
.mtitle{font-size:1rem;font-weight:800;color:var(--blue);margin-bottom:.2rem}
.msub{font-size:.75rem;color:var(--g600);margin-bottom:1rem}
.mbox textarea{width:100%;border:1.5px solid var(--g200);border-radius:var(--rsm);padding:.7rem;font-family:'Montserrat',sans-serif;font-size:.8rem;line-height:1.6;min-height:180px;outline:none;resize:vertical}
.mbox textarea:focus{border-color:var(--blue)}
.macts{display:flex;gap:.6rem;margin-top:.9rem;justify-content:flex-end}
.mcancel{background:none;border:1.5px solid var(--g200);border-radius:100px;padding:.45rem 1.1rem;font-family:'Montserrat',sans-serif;font-size:.78rem;font-weight:600;color:var(--g600);cursor:pointer}
.msend{background:#25D366;border:none;border-radius:100px;padding:.45rem 1.4rem;font-family:'Montserrat',sans-serif;font-size:.78rem;font-weight:700;color:var(--white);cursor:pointer;text-decoration:none;display:inline-block}
.msend:hover{background:#1DA851}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lbox">
    <div class="llogo">Start<span>Kaba</span></div>
    <p class="lsub">Dashboard admin — acces restreint</p>
    <input type="password" id="pwdInput" placeholder="Mot de passe" />
    <button class="lbtn" onclick="checkLogin()">Acceder</button>
    <p class="lerr" id="loginErr">Mot de passe incorrect.</p>
  </div>
</div>

<div id="app">
  <nav>
    <div class="nlogo">Start<span>Kaba</span> <span style="font-weight:400;font-size:.85rem;color:var(--g600);margin-left:6px;">/ Admin Beta</span></div>
    <div class="nright">
      <span class="nbadge" id="navBadge">— candidats</span>
      <button class="brefresh" onclick="loadData()">Actualiser</button>
    </div>
  </nav>

  <div class="main">
    <div class="sgrid">
      <div class="sc"><div class="slabel">Total</div><div class="sval b" id="sTot">0</div></div>
      <div class="sc"><div class="slabel">En attente</div><div class="sval o" id="sAtt">0</div></div>
      <div class="sc"><div class="slabel">Acceptes</div><div class="sval g" id="sAcc">0</div></div>
      <div class="sc"><div class="slabel">Actifs</div><div class="sval b" id="sAct">0</div></div>
      <div class="sc"><div class="slabel">Refuses</div><div class="sval r" id="sRef">0</div></div>
      <div class="sc"><div class="slabel">J3 valides</div><div class="sval b" id="sJ3">0</div></div>
      <div class="sc"><div class="slabel">J7 valides</div><div class="sval b" id="sJ7">0</div></div>
      <div class="sc"><div class="slabel">Termines</div><div class="sval g" id="sJ14">0</div></div>
    </div>

    <div class="filters">
      <button class="fbtn active" onclick="setFilter('tous',this)">Tous</button>
      <button class="fbtn" onclick="setFilter('en_attente',this)">En attente</button>
      <button class="fbtn" onclick="setFilter('accepte',this)">Acceptes</button>
      <button class="fbtn" onclick="setFilter('actif',this)">Actifs</button>
      <button class="fbtn" onclick="setFilter('refuse',this)">Refuses</button>
      <button class="fbtn" onclick="setFilter('termine',this)">Termines</button>
      <input class="sinput" type="text" id="searchInput" placeholder="Rechercher prenom, ville..." oninput="renderCards()" />
    </div>

    <div class="clist" id="clist">
      <div class="smsg"><div class="spin"></div><br>Chargement...</div>
    </div>
  </div>
</div>

<div id="modal">
  <div class="mbox">
    <div class="mtitle" id="mTitle">Message WhatsApp</div>
    <div class="msub" id="mSub"></div>
    <textarea id="mTxt"></textarea>
    <div class="macts">
      <button class="mcancel" onclick="closeModal()">Annuler</button>
      <a class="msend" id="mLink" href="#" target="_blank" onclick="closeModal()">Ouvrir WhatsApp</a>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SB_URL  = 'https://lcffxhvmzzxhhpurunhc.supabase.co';
const SB_KEY  = 'sb_publishable_PfNY0MXIIMmDuOsmQiGm9g__wFMph28';
const TABLE   = 'beta_candidatures';
const PWD     = 'startkaba2024';

let data = [];
let filt = 'tous';
let curWa = '';

const SL = {en_attente:'En attente',accepte:'Accepte',refuse:'Refuse',actif:'Actif',termine:'Termine'};
const BC = {en_attente:'ba',accepte:'bacc',refuse:'bref',actif:'bact',termine:'bter'};
const IL = {oui_claire:'Idee claire',oui_vague:'Idee vague',non_cherche:'Cherche idee'};

function msgAccept(p){return`Salut ${p} ! Felicitations, tu es selectionne(e) pour la beta StartKaba !\n\nTon acces est actif maintenant : https://startkaba.vercel.app\n\nLe principe : 2 semaines, ~20 min par jour. Tu m'envoies ici sur WhatsApp chaque blocage ou suggestion au moment ou ca arrive.\n\nJe t'enverrai un check-in au jour 3, au jour 7 et au jour 14.\n\nUn seul engagement : des retours honnetes. Bonne chance ! `}
function msgJ3(p){return`Salut ${p} ! Tu es au jour 3 de ta beta StartKaba.\n\n2 questions rapides :\n1. Tu en es ou dans ta progression ?\n2. Une chose qui t'a surpris ou bloque depuis le debut ?\n\nPas besoin d'ecrire long, un vocal de 30 secondes suffit.`}
function msgJ7(p){return`Salut ${p} ! Mi-parcours de ta beta StartKaba.\n\n3 questions courtes :\n1. Ce que tu retiens le plus jusqu'ici (une chose)\n2. Ce qui t'a le plus bloque ou frustre\n3. Tu conseillerais StartKaba a qui autour de toi ?\n\nEt sur 10, tu recommanderais StartKaba a un ami entrepreneur ?`}
function msgJ14(p){return`Salut ${p} ! Tu arrives a la fin de tes 2 semaines de beta StartKaba, merci !\n\nJe voudrais faire un appel rapide de 20 minutes pour recueillir ton retour complet.\n\nTu es dispo quand cette semaine ? Propose-moi 2-3 creneaux et je m'adapte.`}

function checkLogin(){
  if(document.getElementById('pwdInput').value===PWD){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    loadData();
  }else{document.getElementById('loginErr').style.display='block'}
}
document.getElementById('pwdInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkLogin()});

async function sbFetch(url,opts={}){
  return fetch(url,{...opts,headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json',...(opts.headers||{})}});
}

async function loadData(){
  try{
    const r=await sbFetch(`${SB_URL}/rest/v1/${TABLE}?order=soumis_le.desc`);
    if(!r.ok)throw new Error(r.statusText);
    data=await r.json();
    updateStats();renderCards();
    document.getElementById('navBadge').textContent=data.length+' candidat'+(data.length>1?'s':'');
  }catch(e){document.getElementById('clist').innerHTML='<div class="smsg">Erreur Supabase.</div>'}
}

function updateStats(){
  document.getElementById('sTot').textContent=data.length;
  document.getElementById('sAtt').textContent=data.filter(r=>r.statut==='en_attente').length;
  document.getElementById('sAcc').textContent=data.filter(r=>r.statut==='accepte').length;
  document.getElementById('sAct').textContent=data.filter(r=>r.statut==='actif').length;
  document.getElementById('sRef').textContent=data.filter(r=>r.statut==='refuse').length;
  document.getElementById('sJ3').textContent=data.filter(r=>r.check_j3).length;
  document.getElementById('sJ7').textContent=data.filter(r=>r.check_j7).length;
  document.getElementById('sJ14').textContent=data.filter(r=>r.check_j14||r.statut==='termine').length;
}

function setFilter(m,btn){
  filt=m;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderCards();
}

function getFiltered(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  return data.filter(r=>{
    const mf=filt==='tous'||r.statut===filt;
    const ms=!q||(r.prenom||'').toLowerCase().includes(q)||(r.ville||'').toLowerCase().includes(q)||(r.whatsapp||'').includes(q);
    return mf&&ms;
  });
}

function ini(p){return(p||'?').slice(0,2).toUpperCase()}
function fmtD(iso){if(!iso)return'--';return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'})}

function renderCards(){
  const rows=getFiltered();
  const list=document.getElementById('clist');
  if(!rows.length){list.innerHTML='<div class="smsg">Aucun resultat.</div>';return}
  list.innerHTML=rows.map(r=>{
    const id=r.id,prenom=r.prenom||'--',statut=r.statut||'en_attente';
    const waNum=(r.whatsapp||'').replace(/\D/g,'');
    const ideeL=IL[r.idee]||r.idee||'--';
    const notes=(r.notes_internes||'').replace(/"/g,'&quot;');
    const estAccepte=['accepte','actif','termine'].includes(statut);
    const sOpts=['en_attente','accepte','actif','refuse','termine'].map(s=>`<option value="${s}"${statut===s?' selected':''}>${SL[s]}</option>`).join('');
    return`<div class="cc s-${statut}" id="cc-${id}">
  <div class="ch">
    <div class="cid">
      <div class="av">${ini(prenom)}</div>
      <div>
        <div class="cname">${prenom}</div>
        <div class="cmeta">${r.ville||'--'} &middot; ${ideeL} &middot; ${fmtD(r.soumis_le)} &middot; ${r.decouverte||'--'}</div>
      </div>
    </div>
    <div class="cact">
      <span class="badge ${BC[statut]||'ba'}">${SL[statut]}</span>
      ${!estAccepte?`<button class="btn btn-ok" onclick="accepter('${id}','${prenom}','${waNum}')">Accepter</button>`:''}
      ${statut==='en_attente'?`<button class="btn btn-no" onclick="refuser('${id}')">Refuser</button>`:''}
      <a class="btn btn-wa" href="https://wa.me/${waNum}" target="_blank">${r.whatsapp||'--'}</a>
    </div>
  </div>
  <div class="cbody">
    <div>
      <div class="stitle">Motivation</div>
      <div class="pourq">"${r.pourquoi||'--'}"</div>
    </div>
    <div>
      <div class="stitle">Suivi beta</div>
      <select class="ssel" onchange="updateStatut('${id}',this.value)">${sOpts}</select>
      <div class="chrow">
        <div class="chi"><div class="cdot${r.check_j3?' done':''}" onclick="toggleCheck('${id}','check_j3',this)">J3</div><div class="clabel">Jour 3</div></div>
        <div class="chi"><div class="cdot${r.check_j7?' done':''}" onclick="toggleCheck('${id}','check_j7',this)">J7</div><div class="clabel">Jour 7</div></div>
        <div class="chi"><div class="cdot${r.check_j14?' done':''}" onclick="toggleCheck('${id}','check_j14',this)">J14</div><div class="clabel">Jour 14</div></div>
      </div>
    </div>
    <div>
      <div class="stitle">Messages WhatsApp</div>
      <div class="wabts">
        ${estAccepte?`<button class="btn btn-wa" style="width:100%;justify-content:center" onclick="openMsg('${id}','bienvenue','${prenom}','${waNum}')">Bienvenue</button>`:''}
        <button class="btn btn-n" style="width:100%;justify-content:center" onclick="openMsg('${id}','j3','${prenom}','${waNum}')">Check-in J3</button>
        <button class="btn btn-n" style="width:100%;justify-content:center" onclick="openMsg('${id}','j7','${prenom}','${waNum}')">Check-in J7</button>
        <button class="btn btn-n" style="width:100%;justify-content:center" onclick="openMsg('${id}','j14','${prenom}','${waNum}')">Check-in J14</button>
      </div>
    </div>
    <div style="grid-column:1/-1">
      <div class="stitle">Notes internes</div>
      <textarea class="nota" id="note-${id}" placeholder="Tes observations...">${notes}</textarea>
      <button class="snbtn" id="snbtn-${id}" onclick="saveNote('${id}')">Sauvegarder</button>
    </div>
  </div>
</div>`;
  }).join('');
}

async function accepter(id,prenom,waNum){
  await sbPatch(id,{statut:'accepte'});
  const i=data.findIndex(r=>r.id===id);
  if(i!==-1)data[i].statut='accepte';
  updateStats();renderCards();
  openMsg(id,'bienvenue',prenom,waNum);
  toast('Candidat accepte');
}

async function refuser(id){
  await sbPatch(id,{statut:'refuse'});
  const i=data.findIndex(r=>r.id===id);
  if(i!==-1)data[i].statut='refuse';
  updateStats();renderCards();
  toast('Candidature refusee');
}

async function updateStatut(id,v){
  const i=data.findIndex(r=>r.id===id);
  if(i!==-1)data[i].statut=v;
  updateStats();
  await sbPatch(id,{statut:v});
  toast('Statut mis a jour');
}

async function toggleCheck(id,field,el){
  const i=data.findIndex(r=>r.id===id);
  if(i===-1)return;
  const nv=!data[i][field];
  data[i][field]=nv;
  el.classList.toggle('done',nv);
  updateStats();
  await sbPatch(id,{[field]:nv});
  toast(field.replace('check_','').toUpperCase()+(nv?' valide':' retire'));
}

async function saveNote(id){
  const val=document.getElementById('note-'+id).value;
  const btn=document.getElementById('snbtn-'+id);
  const i=data.findIndex(r=>r.id===id);
  if(i!==-1)data[i].notes_internes=val;
  await sbPatch(id,{notes_internes:val});
  btn.textContent='Sauvegarde';btn.classList.add('saved');
  setTimeout(()=>{btn.textContent='Sauvegarder';btn.classList.remove('saved')},2200);
}

async function sbPatch(id,body){
  try{
    await sbFetch(`${SB_URL}/rest/v1/${TABLE}?id=eq.${id}`,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify(body)});
  }catch(e){toast('Erreur Supabase',true)}
}

function openMsg(id,type,prenom,waNum){
  curWa=waNum;
  const T={bienvenue:'Message de bienvenue',j3:'Check-in Jour 3',j7:'Check-in Jour 7',j14:'Check-in Jour 14'};
  const M={bienvenue:msgAccept(prenom),j3:msgJ3(prenom),j7:msgJ7(prenom),j14:msgJ14(prenom)};
  const r=data.find(x=>x.id===id)||{};
  document.getElementById('mTitle').textContent=T[type];
  document.getElementById('mSub').textContent='Pour '+prenom+' — '+(r.whatsapp||'');
  document.getElementById('mTxt').value=M[type];
  updateMLink();
  document.getElementById('modal').classList.add('open');
}

function updateMLink(){
  document.getElementById('mLink').href='https://wa.me/'+curWa+'?text='+encodeURIComponent(document.getElementById('mTxt').value);
}
document.getElementById('mTxt').addEventListener('input',updateMLink);

function closeModal(){document.getElementById('modal').classList.remove('open')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()});

let tt;
function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=err?'var(--red)':'var(--g900)';
  el.classList.add('show');clearTimeout(tt);
  tt=setTimeout(()=>el.classList.remove('show'),2200);
}
</script>
